        function fetchDirectoryPath() {
            fetch('/get-host-directory')  // Change the endpoint to fetch the directory path
                .then(response => response.json())
                .then(data => {
                    const directoryPathElement = document.getElementById('directory-path');
                    directoryPathElement.textContent = data.path;  // Display the directory path

                    // Show the scan button
                    document.getElementById('scan-button').style.display = 'inline-block';
                })
                .catch(error => {
                    console.error('Error fetching directory path:', error);
                });
        }

        // Fetch directory contents when the page loads
        window.onload = fetchDirectoryPath;
    </script>
    <script>
        // Function to handle the file upload and trigger the streaming
        const scanButton = document.getElementById('scan-button');
        scanButton.addEventListener('click', function (event) {
            scanButton.innerHTML = 'Scanning...';  // Show a message while scanning
            scan();
        });

        function scan() {
            const outputDiv = document.getElementById('output-div');

            // Create a new EventSource instance to receive SSE from the server
            const eventSource = new EventSource('/scan');

            // Listen for new messages from the server
            eventSource.onmessage = function (event) {
                console.log(event.data)
                outputDiv.innerHTML += event.data + '<br>';
                outputDiv.scrollTop = outputDiv.scrollHeight;  // Auto-scroll to the bottom
            };
            eventSource.addEventListener('close', function(event) {
                console.log('Connection closed');
                const scanButton = document.getElementById('scan-button');
                scanButton.innerText = "Scan";
            });

            eventSource.addEventListener('download', function (event) {
                const downloadUrl = event.data;
                console.log("Download link received:", downloadUrl);  // Log the download URL

                // Create a hidden link element and trigger a click to start the download
                const link = document.createElement('a');
                link.href = downloadUrl;
                link.download = 'results.zip';  // The name can be overridden by the server response
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);  // Clean up the link after downloading
            });
            // Handle any errors with the connection
            eventSource.onerror = function (event) {
                console.error("Error in stream:", event);
                const scanButton = document.getElementById('scan-button');
                scanButton.innerText = "Scan";
                eventSource.close();
            };
        }

    </script>

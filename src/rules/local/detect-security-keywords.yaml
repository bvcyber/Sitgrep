rules:
  - id: detect-security-keywords
    patterns:
      - pattern-either:
        - pattern-regex: (?i)(?:vulnerability|vuln|\bbug\b(?!\S)bug)
        - pattern-regex: (?i)(?:denial-of-service|ddos|denial of service)
        - pattern-regex: (?i)(?:privilege[-_\s]?escalation)
      - pattern-not-regex: (?i)example|sample|test|fake|(x){2,}|dependency[\s\b\w]+injection
  
    message: Found a security-relevant keyword. Please review
    languages:
      - regex
    severity: WARNING
    metadata:
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      category: security
      technology:
        - secrets
      confidence: LOW
      owasp:
        - A07:2021 - Identification and Authentication Failures
      references:
        - https://owasp.org/Top10/A07_2021-Identification_and_Authentication_Failures
      cwe2022-top25: true
      cwe2021-top25: true
      subcategory:
        - audit
      likelihood: LOW
      impact: HIGH
      license: Commons Clause License Condition v1.0[LGPL-2.1-only]
      vulnerability_class:
        - Hard-coded Secrets
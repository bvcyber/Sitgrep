rules:
  - id: detect-hardcoded-password
    patterns:
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)([\w\.]*(passwd|password)[\w\.]*)
      - pattern-either:
        - pattern: $VAR = ...
        - pattern: '"... $VAR ..." + ...'
      - pattern-not-regex: (?i)(example|sample|test|fake|(x){2,})
    message: Found a potential hard-coded password. Hard-coded secrets can lead to privilege esaclation if the source code is obtained by threat actors.
    languages:
      - java
      - csharp
      - python
      - kotlin
      - c
      - c++
      - rust
      - go
      - javascript
      - typescript
    severity: WARNING
    metadata:
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      category: security
      technology:
        - secrets
      confidence: MEDIUM
      owasp:
        - A07:2021 - Identification and Authentication Failures
      references:
        - https://owasp.org/Top10/A07_2021-Identification_and_Authentication_Failures
      cwe2022-top25: true
      cwe2021-top25: true
      subcategory:
        - audit
      likelihood: MEDIUM
      impact: HIGH
      license: Commons Clause License Condition v1.0[LGPL-2.1-only]
      vulnerability_class:
        - Hard-coded Secrets
